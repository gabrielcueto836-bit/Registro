<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewprt" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Documento</title>
    </head>
    <title>Registro de Documento</title>
<body>

    <div class="formulario" id="registro">
        <h2>Registro</h2>
        <form id="formulario-registro">
            <input type="text" id="reg-username" placeholder="Username" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <button type="submit">Registrar</button>
        </form>
        <button class="cambiar" onclick="mostrarLogin()">¿Ya tienes cuenta? Inicia sesión</button>
    </div>   
    

    <div class="formulario oculto" id="login">
        <h2>Iniciar sesión</h2>
        <form id="formulario-login">
            <input type="text" id="log-username" placeholder="Username" required>
            <input type="password" id="log-password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <button class="cambiar" onclick="mostrarRegistro()">Crear cuenta</button>
    </div>
    
    <p id="mensaje"></p>


     <div class="seccion-protegida" style="margin-top: 20px;">
        <h3>Recurso Protegido</h3>
        <button id="acceso-protegido">Acceder a datos protegidos</button>
        <p id="mensaje-protegido"></p>
     </div>

    <script src="app.js"></script>
    
</body>
</html>
